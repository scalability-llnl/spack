spack:
  view: false

  concretizer:
    reuse: false
    unify: when_possible

  packages:
    all:
      require: '%gcc target=x86_64_v3'
      providers:
        blas: [openblas]
        mpi: [mpich]
        tbb: [intel-tbb]
      variants: +mpi
    acts:
      require: +analysis +dd4hep +edm4hep +examples +fatras +geant4 +hepmc3 +podio +pythia8 +python ~svg +tgeo cxxstd=20
    celeritas:
      require: +geant4 +hepmc3 +openmp +root +shared cxxstd=20
    root:
      require: +davix +dcache +examples +fftw +fits +fortran +gdml +graphviz +gsl +http +math +minuit +mlp +mysql +opengl +postgres +pythia8 +python +r +roofit +root7 +rpath ~shadow +spectrum +sqlite +ssl +tbb +threads +tmva +tmva-cpu +unuran +vc +vdt +veccore +webgui +x +xml +xrootd
    vecgeom:
      require: +gdml +geant4 +root

    # Mark geant4 data as external to prevent wasting bandwidth on GB-scale files
    geant4-data:
      buildable: false
      externals:
        - spec: geant4-data@11.3.0
          prefix: /usr
        - spec: geant4-data@11.2.2
          prefix: /usr
        - spec: geant4-data@11.2.0
          prefix: /usr
        - spec: geant4-data@11.1.0
          prefix: /usr
        - spec: geant4-data@11.0.0
          prefix: /usr

  specs:
  # CPU
  - acts ~cuda
  - celeritas ~cuda ~rocm +vecgeom
  - dd4hep +ddalign +ddcad +ddcond +dddetectors +dddigi +ddeve +ddg4 +ddrec +edm4hep +hepmc3 +lcio +utilityapps +xercesc
  - delphes +pythia8
  - dpmjet
  - edm4hep
  - fastjet
  - fjcontrib
  - gaudi +aida +examples +heppdt +xercesc ^gdb +debuginfod +python
  - geant4 +opengl +qt +threads ~vtk ^[virtuals=qmake] qt
  - hepmc
  - hepmc3 +interfaces +protobuf +python +rootio
  #- herwig3 +njet +vbfnlo  # Note: herwig3 fails to find evtgen
  - lcio -examples ~jar +rootdict  # Note: lcio +examples ^ncurses -termlib, which leads to conflicts
  - lhapdf +python
  - madgraph5amc
  - opendatadetector
  - pandoramonitoring
  - pandorapfa
  - pandorasdk
  - podio +rntuple +sio
  - py-awkward
  - py-boost-histogram
  - py-hepunits
  - py-hist
  - py-histbook
  - py-histoprint
  - py-iminuit
  - py-mplhep
  - py-particle
  - py-uhi
  - py-uproot +lz4 +xrootd +zstd
  - py-vector
  - pythia8 +evtgen +fastjet +hdf5 +hepmc +hepmc3 +lhapdf ~madgraph5amc +python +rivet ~root # pythia8 and root circularly depend
  - rivet hepmc=3
  - root ~cuda
  - sherpa +analysis ~blackhat +gzip +hepmc3 +hepmc3root +lhapdf +lhole +openloops +pythia ~python ~recola ~rivet +root +ufo
  - thepeg ~rivet
  - vecgeom ~cuda
  - xrootd +davix +http +krb5 +python +readline +scitokens-cpp

  # CUDA NOARCH
  - celeritas +cuda +vecgeom
  - root +cuda +cudnn +tmva-gpu

  # CUDA 80
  - acts +cuda +traccc cuda_arch=80
  - vecgeom +cuda cuda_arch=80

  # CUDA 90
  - acts +cuda +traccc cuda_arch=90
  - vecgeom +cuda cuda_arch=90

  # ROCm 90a
  - celeritas +rocm amdgpu_target=gfx90a ~vecgeom  # only available with ORANGE

  ci:
    pipeline-gen:
    - build-job:
        image: "ghcr.io/spack/spack/ubuntu22.04-runner-amd64-gcc-11.4:2024.03.01"

  cdash:
    build-group: HEP
